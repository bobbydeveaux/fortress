{{template "layout" .}}
{{define "content"}}
<h1>Chat with Jor-El</h1>

<div class="chat-container">
    <div id="chat-messages" class="chat-messages"></div>

    <form id="chat-form" class="chat-form" onsubmit="sendMessage(event)">
        <input type="text" id="chat-input" placeholder="Ask Jor-El about the codebase..." autofocus>
        <button type="submit">Send</button>
    </form>
</div>

<script>
function sendMessage(e) {
    e.preventDefault();
    const input = document.getElementById('chat-input');
    const messages = document.getElementById('chat-messages');
    const query = input.value.trim();
    if (!query) return;

    // Add user message
    const userMsg = document.createElement('div');
    userMsg.className = 'message user-message';
    userMsg.textContent = query;
    messages.appendChild(userMsg);

    // Add assistant message placeholder
    const assistantMsg = document.createElement('div');
    assistantMsg.className = 'message assistant-message';
    messages.appendChild(assistantMsg);

    input.value = '';
    messages.scrollTop = messages.scrollHeight;

    // Stream response
    const evtSource = new EventSource('/api/chat/stream?q=' + encodeURIComponent(query));
    evtSource.onmessage = function(event) {
        if (event.data === '[DONE]') {
            evtSource.close();
            return;
        }
        assistantMsg.textContent += event.data;
        messages.scrollTop = messages.scrollHeight;
    };
    evtSource.onerror = function() {
        evtSource.close();
    };
}
</script>
{{end}}
